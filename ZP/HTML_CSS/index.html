<html>
  <head>
    <title>Título da sua página</title>
  </head>
  <body>
    <!-- 
      Propriedades da tag:
      - width = determina uma largura para a imagem
      - height = determina uma altura para a imagem
      - alt = nome da imagem, exibida caso a imagem não exista
      - title = legenda da imagem
    -->

    <!-- imagem na raiz do site -->
    <img src="./imagem.jpg" />

    <!-- imagem em uma pasta -->
    <img src="./pasta/imagem.jpg" />

    <!-- imagem através de url -->
    <img
      src="http://www.google.com.br/google.jpg"
      alt="Google"
      title="Esta é uma legenda da imagem" />
  </body>
</html>
