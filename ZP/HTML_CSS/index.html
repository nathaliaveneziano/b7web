<html>
  <head>
    <title>Título da sua página</title>
  </head>
  <body>
    <p>
      <!-- <br> = quebra de linha -->
      Olá, este é um teste. <br />
      Este é o complemento da linha 1
    </p>
    <p>Esta é a segunda linha do texto.</p>
    <!-- <pre> = deixa o texto da mesma forma que inserido, mas ignora qualquer tag HTML dentro dela -->
    <pre>
      Este é um poema
      que assim vai soar.

      Se eu quiser fazer
      ele vai ficar.
    </pre>
    Este é um poema <br />
    que assim vai soar. <br /><br />

    Se eu quiser fazer <br />
    ele vai ficar.
  </body>
</html>
