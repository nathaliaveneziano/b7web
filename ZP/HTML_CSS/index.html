<html>
  <head>
    <title>Título da sua página</title>
  </head>
  <body>
    <!-- <b> = negrito. Descontinuada pela W3C, foi trocada pela <strong> -->
    Este é um <strong>poema</strong> <br />
    que <i>assim</i> vai soar. <br /><br />
    <!-- <i> = itálico -->

    <!-- <u> = sublinhado -->
    Se <u>eu</u> quiser fazer <br />
    ele vai ficar.<br /><br />

    <!-- <small> = diminui um pouco o tamanho do texto -->
    R$ <small>100,00</small><br />
    <!-- <small> = risca o texto no meio -->
    <strike>R$ 100,00</strike><br />
    <!-- <sub> = abaixa um pouco o caracter, comum em fórmulas químicas -->
    R$ 100,<sub>00</sub><br />
    <!-- <sup> = sobe um pouco o caracter, comum em fórmulas matemáticas -->
    R$ 100,<sup>00</sup>
  </body>
</html>
