<html>
  <head>
    <title>Título da sua página</title>
  </head>
  <body>
    onclick
    <img src="http://www.google.com.br/google.jpg" onclick="alert('Clicou!')" />

    <br /><br />

    onmouseover
    <img
      src="http://www.google.com.br/google.jpg"
      onmouseover="alert('Clicou!')" />

    <br /><br />

    onmouseout
    <img
      src="http://www.google.com.br/google.jpg"
      onmouseout="alert('Clicou!')" />
  </body>
</html>
